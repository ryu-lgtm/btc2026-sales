<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPYR Sales — Bitcoin 2026 営業リスト</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<header>
  <div>
    <h1 data-i18n="title">JPYR Sales — Bitcoin 2026 営業リスト</h1>
    <div class="meta" data-i18n="meta">4/27〜29 @ The Venetian, Las Vegas ｜ 更新: 2026-04-25</div>
  </div>
  <div class="share-note" data-i18n="shareNote">🔗 URLを共有するだけで閲覧・編集可能</div>
  <div class="lang-toggle">
    <button type="button" class="lang-btn" onclick="switchLang('ja')">🇯🇵</button>
    <button type="button" class="lang-btn" onclick="switchLang('en')">🇺🇸</button>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label" data-i18n="connecting">接続中...</span>
  </div>
</header>

<section class="session-bar">
  <div class="session-copy">
    <div class="session-title" data-i18n="sessionTitle">営業チーム共有メモ</div>
    <div class="session-desc" data-i18n="sessionDesc">トミーさんが優先度とプロダクトを整理し、全員が名前付きでメモを残せます。</div>
  </div>
  <div class="session-controls">
    <label class="session-field">
      <span data-i18n="nameLabel">メモする人</span>
      <input type="text" id="member-name" maxlength="24" data-i18n-placeholder="namePlaceholder" placeholder="例: Tommy / Ken / Aki">
    </label>
    <div class="session-field">
      <span data-i18n="roleLabel">権限</span>
      <div class="role-toggle">
        <button type="button" class="role-btn active" id="role-member" onclick="setRole('member')" data-i18n="roleMember">営業メンバー</button>
        <button type="button" class="role-btn" id="role-tommy" onclick="setRole('tommy')" data-i18n="roleTommy">トミーさん</button>
      </div>
    </div>
  </div>
  <div class="session-status" id="session-status" data-i18n="nameHint">名前を入れると、誰のメモか見分けられるようになります。</div>
</section>

<div class="tabs">
  <div class="tab active" onclick="switchTab('speakers')" data-i18n="tabSpeakers">🎤 スピーカー</div>
  <div class="tab" onclick="switchTab('sponsors')" data-i18n="tabSponsors">🏢 スポンサー</div>
</div>

<div class="filters" id="filters-speakers">
  <input type="text" class="search-box" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 検索..." oninput="handleSearch('speakers', this.value)">
  <div class="filter-sep"></div>
  <button class="filter-btn active" onclick="setFilter('speakers','all',this)" data-i18n="filterAll">全て</button>
  <button class="filter-btn" onclick="setFilter('speakers','jpyr',this)">JPYR</button>
  <button class="filter-btn" onclick="setFilter('speakers','sto',this)">STO</button>
  <button class="filter-btn" onclick="setFilter('speakers','izy',this)">IZY</button>
  <button class="filter-btn" onclick="setFilter('speakers','cpd',this)">CPD</button>
  <button class="filter-btn" onclick="setFilter('speakers','other',this)" data-i18n="filterOther">その他PJ</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('speakers','high',this)" data-i18n="filterHigh">🔴 重要</button>
  <button class="filter-btn" onclick="setFilter('speakers','med',this)" data-i18n="filterMed">🟡 優先</button>
  <button class="filter-btn" onclick="setFilter('speakers','low',this)" data-i18n="filterLow">🟢 できれば</button>
  <div class="filter-stats" id="stats-speakers"></div>
</div>

<div class="filters hidden" id="filters-sponsors">
  <input type="text" class="search-box" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 検索..." oninput="handleSearch('sponsors', this.value)">
  <div class="filter-sep"></div>
  <button class="filter-btn active" onclick="setFilter('sponsors','all',this)" data-i18n="filterAll">全て</button>
  <button class="filter-btn" onclick="setFilter('sponsors','jpyr',this)">JPYR</button>
  <button class="filter-btn" onclick="setFilter('sponsors','sto',this)">STO</button>
  <button class="filter-btn" onclick="setFilter('sponsors','izy',this)">IZY</button>
  <button class="filter-btn" onclick="setFilter('sponsors','cpd',this)">CPD</button>
  <button class="filter-btn" onclick="setFilter('sponsors','other',this)" data-i18n="filterOther">その他PJ</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('sponsors','high',this)" data-i18n="filterHigh">🔴 重要</button>
  <button class="filter-btn" onclick="setFilter('sponsors','med',this)" data-i18n="filterMed">🟡 優先</button>
  <button class="filter-btn" onclick="setFilter('sponsors','low',this)" data-i18n="filterLow">🟢 できれば</button>
  <div class="filter-stats" id="stats-sponsors"></div>
</div>

<div class="legend">
  <div><span class="legend-dot" style="background:var(--red)"></span> <span data-i18n="legendHigh">🔴 重要（必ず話す）</span></div>
  <div><span class="legend-dot" style="background:var(--yellow)"></span> <span data-i18n="legendMed">🟡 優先（優先的に話す）</span></div>
  <div><span class="legend-dot" style="background:var(--green)"></span> <span data-i18n="legendLow">🟢 できれば（余裕があれば）</span></div>
  <div style="margin-left:auto;color:var(--orange);font-size:11px;" data-i18n="legendNew">NEW = 前回リストに未掲載</div>
</div>

<div class="grid" id="content-speakers"></div>
<div class="grid hidden" id="content-sponsors"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
